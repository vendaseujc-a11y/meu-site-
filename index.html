        let currentModule = 0;
        let currentSlide = 0;

        function renderSlide() {
            const module = courseData[currentModule];
            const slide = module.slides[currentSlide];
            
            document.getElementById('currentModule').textContent = currentModule + 1;
            document.getElementById('totalModules').textContent = courseData.length;
            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('totalSlides').textContent = module.slides.length;

            const colorMap = {
                blue: 'blue',
                green: 'green',
                purple: 'purple',
                orange: 'orange',
                pink: 'pink',
                indigo: 'indigo',
                teal: 'teal',
                red: 'red'
            };
            const color = colorMap[module.color] || 'yellow';

            document.getElementById('slideContent').innerHTML = `
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 bg-${color}-100 rounded-full flex items-center justify-center text-${color}-600">
                        <i class="fas ${module.icon}"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">${slide.title}</h2>
                </div>
                ${slide.content}
                <div class="mt-8 pt-6 border-t border-gray-200">
                    <a href="https://wa.me/message/FK22NAQD3VGQE1" target="_blank" class="flex items-center justify-center gap-3 bg-green-500 hover:bg-green-600 text-white py-3 px-6 rounded-lg font-medium transition shadow-lg hover:shadow-xl">
                        <i class="fab fa-whatsapp text-xl"></i>
                        <span>Tem alguma dúvida? Fale comigo no WhatsApp!</span>
                    </a>
                </div>
            `;

            document.getElementById('prevBtn').disabled = currentSlide === 0 && currentModule === 0;
            document.getElementById('nextBtn').disabled = currentSlide === module.slides.length - 1 && currentModule === courseData.length - 1;

            renderDots();
        }

        function renderDots() {
            const module = courseData[currentModule];
            const dotsContainer = document.getElementById('progressDots');
            let dots = '';
            
            for (let i = 0; i < module.slides.length; i++) {
                const active = i === currentSlide ? 'bg-yellow-500' : 'bg-gray-300';
                dots += `<div class="w-3 h-3 rounded-full ${active} transition"></div>`;
            }
            dotsContainer.innerHTML = dots;
        }

        function changeSlide(direction) {
            const module = courseData[currentModule];
            
            if (direction === 1) {
                if (currentSlide < module.slides.length - 1) {
                    currentSlide++;
                } else if (currentModule < courseData.length - 1) {
                    currentModule++;
                    currentSlide = 0;
                }
            } else {
                if (currentSlide > 0) {
                    currentSlide--;
                } else if (currentModule > 0) {
                    currentModule--;
                    currentSlide = courseData[currentModule].slides.length - 1;
                }
            }
            
            renderSlide();
        }

        function goToModule(moduleIndex) {
            currentModule = moduleIndex;
            currentSlide = 0;
            renderSlide();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') changeSlide(1);
            if (e.key === 'ArrowLeft') changeSlide(-1);
        });

        renderSlide();
    </script>
